<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Mudae $oc Assistant</title>

  <style>
    :root {
      --bg: #313338;
      --panel: #2b2d31;
      --cell: #4e5058;
      --text: #dbdee1;
      --danger: #ed4245;

      --possible: #5865f2;
      --blocked: #232428;
      --blockedText: #8a8f98;
    }

    body {
      font-family: "gg sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h2 {
      margin: 6px 0 2px 0;
      line-height: 1.1;
    }

    .subtitle {
      margin: 0 0 14px 0;
      font-size: 0.72rem;
      opacity: 0.75;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 60px);
      gap: 8px;
      background: var(--panel);
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 18px;
    }

    .cellBox {
      width: 60px;
      height: 45px;
      background: var(--cell);
      border-radius: 6px;
      border: 1px solid rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }

    .cellBox:hover { opacity: 0.86; }

    .cellBox.possible {
      background: var(--possible);
      color: #fff;
    }

    .cellBox.blocked {
      background: var(--blocked);
      color: var(--blockedText);
    }

    .cellBox.locked {
      cursor: not-allowed;
    }

    .icon {
      width: 22px;
      height: 22px;
      pointer-events: none;
    }

    .prob {
      margin-top: 2px;
      font-size: 0.78rem;
      font-weight: 900;
      pointer-events: none;
      line-height: 1;
    }

    .palette {
      display: grid;
      grid-template-columns: repeat(5, 56px);
      gap: 10px;
      background: var(--panel);
      padding: 14px;
      border-radius: 8px;
      justify-content: center;
      align-items: center;
    }

    .inkBtn {
      width: 56px;
      height: 44px;
      border-radius: 10px;
      cursor: pointer;
      border: 2px solid transparent;
      background: rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .inkBtn:hover { opacity: 0.9; }

    .inkBtn.active {
      border-color: #fff;
      box-shadow: 0 0 10px rgba(255,255,255,0.25);
    }

    .inkBtn img {
      width: 26px;
      height: 26px;
      pointer-events: none;
    }

    .controls { margin-top: 16px; }

    .resetBtn {
      background: var(--danger);
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 900;
    }
  </style>
</head>

<body>
<h2>Mudae '$oc' Assistant</h2>
<p class="subtitle">Each % is the chance Red is in that square (given your clues)</p>

<div class="grid" id="grid"></div>
<div class="palette" id="palette"></div>

<div class="controls">
  <button class="resetBtn" id="clearBtn">Clear Board</button>
</div>

<script>
  const ICONS = {
    Purple:  "https://cdn.discordapp.com/emojis/1437140625844867244.webp",
    Blue:    "https://cdn.discordapp.com/emojis/1437140639987929108.webp",
    Teal:    "https://cdn.discordapp.com/emojis/1437140651614535680.webp",
    Yellow:  "https://cdn.discordapp.com/emojis/1437140677187338310.webp",
    Orange:  "https://cdn.discordapp.com/emojis/1437140688608432185.webp",
    Green:   "https://cdn.discordapp.com/emojis/1437140664193126441.webp",
    Red:     "https://cdn.discordapp.com/emojis/1437140700604137554.webp",
    White:   "https://cdn.discordapp.com/emojis/1437140737459486780.webp",
    Black:   "https://cdn.discordapp.com/emojis/1437140725492879471.webp",
    Mystery: "https://cdn.discordapp.com/emojis/1437140748423270441.webp",
  };

  const INKS = [
    { key: "None",   icon: ICONS.Mystery },
    { key: "Teal",   icon: ICONS.Teal },
    { key: "Blue",   icon: ICONS.Blue },
    { key: "Yellow", icon: ICONS.Yellow },
    { key: "Green",  icon: ICONS.Green },
    { key: "Orange", icon: ICONS.Orange },
    { key: "Red",    icon: ICONS.Red },
    { key: "Purple", icon: ICONS.Purple },
    { key: "White",  icon: ICONS.White },
    { key: "Black",  icon: ICONS.Black },
  ];

  const N = 5;
  const CENTER = { r: 2, c: 2 };

  const gridEl = document.getElementById("grid");
  const paletteEl = document.getElementById("palette");
  const clearBtn = document.getElementById("clearBtn");

  let currentInk = "None";
  let board = Array.from({ length: N }, () => Array(N).fill(null));

  function isCenter(r, c) {
    return r === CENTER.r && c === CENTER.c;
  }

  function hasAnyRed() {
    return board.flat().includes("Red");
  }

  function canInteractCell(r, c) {
    const redPlaced = hasAnyRed();
    if (redPlaced && board[r][c] === null && !isCenter(r, c)) return false;
    return true;
  }

  function isValidRed(rr, rc) {
    if (isCenter(rr, rc)) return false;

    for (let r = 0; r < N; r++) {
      for (let c = 0; c < N; c++) {
        const mark = board[r][c];
        if (!mark) continue;

        const dr = Math.abs(r - rr);
        const dc = Math.abs(c - rc);
        const isLine = (r === rr || c === rc);
        const isDiag = (dr === dc);

        if (mark === "Teal"   && !(isLine || isDiag)) return false;
        if (mark === "Blue"   && (isLine || isDiag))  return false;
        if (mark === "Yellow" && !isDiag)             return false;
        if (mark === "Green"  && !isLine)             return false;
        if (mark === "Orange" && !(dr <= 1 && dc <= 1)) return false;
      }
    }
    return true;
  }

  function updateLogic() {
    const redPlaced = hasAnyRed();
    const possibleSpots = [];

    if (!redPlaced) {
      for (let r = 0; r < N; r++) {
        for (let c = 0; c < N; c++) {
          if (isCenter(r, c)) continue;
          if (board[r][c] !== null) continue;
          if (isValidRed(r, c)) possibleSpots.push([r, c]);
        }
      }
    }

    const probText =
            (!redPlaced && possibleSpots.length)
                    ? (100 / possibleSpots.length).toFixed(0) + "%"
                    : "0%";

    gridEl.innerHTML = "";

    for (let r = 0; r < N; r++) {
      for (let c = 0; c < N; c++) {
        const cell = document.createElement("div");
        cell.className = "cellBox";
        cell.onclick = () => {
          if (!canInteractCell(r, c)) return;
          board[r][c] = (currentInk === "None") ? null : currentInk;
          updateLogic();
        };

        const state = board[r][c];

        if (state) {
          const img = document.createElement("img");
          img.src = ICONS[state];
          img.className = "icon";
          cell.appendChild(img);
          cell.appendChild(probEl(isCenter(r,c) ? "0%" : (state === "Red" ? "100%" : "0%")));
        } else if (isCenter(r, c)) {
          cell.classList.add("blocked");
          cell.appendChild(probEl("0%"));
        } else if (!redPlaced && possibleSpots.some(p => p[0] === r && p[1] === c)) {
          cell.classList.add("possible");
          cell.appendChild(probEl(probText));
        } else {
          cell.classList.add("blocked");
          cell.appendChild(probEl("0%"));
        }

        gridEl.appendChild(cell);
      }
    }
  }

  function probEl(t) {
    const d = document.createElement("div");
    d.className = "prob";
    d.textContent = t;
    return d;
  }

  function createPalette() {
    paletteEl.innerHTML = "";
    INKS.forEach((ink, i) => {
      const btn = document.createElement("div");
      btn.className = "inkBtn" + (i === 0 ? " active" : "");
      btn.onclick = () => {
        currentInk = ink.key;
        document.querySelectorAll(".inkBtn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
      };
      const img = document.createElement("img");
      img.src = ink.icon;
      btn.appendChild(img);
      paletteEl.appendChild(btn);
    });
  }

  clearBtn.onclick = () => {
    board = Array.from({ length: N }, () => Array(N).fill(null));
    updateLogic();
  };

  createPalette();
  updateLogic();
</script>
</body>
</html>
