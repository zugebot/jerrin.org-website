<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Mudae $oc Assistant</title>

  <style>
    :root {
      --bg: #313338;
      --panel: #2b2d31;
      --cell: #3a3d45;
      --cell-muted: #2a2c32;
      --cell-center: #232428;
      --cell-marked: #565a65;
      --text: #dbdee1;
      --danger: #ed4245;
      --border: rgba(255,255,255,0.06);
      --border-strong: rgba(255,255,255,0.14);
    }

    body {
      font-family: "gg sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h2 {
      margin: 6px 0 2px 0;
      line-height: 1.1;
    }

    .subtitle {
      margin: 0 0 14px 0;
      font-size: 0.72rem;
      opacity: 0.75;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 64px);
      gap: 8px;
      background: var(--panel);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 18px;
    }

    .cellBox {
      width: 64px;
      height: 64px;
      background: var(--cell);
      border-radius: 10px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      user-select: none;
      box-sizing: border-box;
      padding: 4px 5px;
      overflow: hidden;
      transition: background 0.14s ease, border-color 0.14s ease, box-shadow 0.14s ease, transform 0.08s ease;
    }

    .cellBox:hover {
      border-color: var(--border-strong);
      transform: translateY(-1px);
    }

    .cellBox.centerCell {
      background: var(--cell-center);
    }

    .cellBox.emptyCell {
      background: var(--cell-muted);
    }

    .cellBox.liveCell {
      border-color: rgba(255,255,255,0.11);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
    }

    .cellBox.markedCell {
      background: var(--cell-marked);
      border-color: rgba(255,255,255,0.18);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.05);
    }

    .icon {
      width: 22px;
      height: 22px;
      pointer-events: none;
      margin-bottom: 2px;
      flex: 0 0 auto;
    }

    .stats {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      font-size: 0.62rem;
      line-height: 1.05;
    }

    .statRow {
      display: grid;
      grid-template-columns: 12px 20px;
      align-items: center;
      column-gap: 4px;
      justify-content: center;
      white-space: nowrap;
      font-weight: 500;
    }

    .statRow.active {
      font-weight: 900;
    }

    .statIcon {
      width: 9px;
      height: 9px;
      display: block;
      pointer-events: none;
    }

    .statValue {
      display: block;
      width: 20px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.1px;
    }

    .palette {
      display: grid;
      grid-template-columns: repeat(4, 56px);
      gap: 10px;
      background: var(--panel);
      padding: 14px;
      border-radius: 8px;
      justify-content: center;
      align-items: center;
    }

    .inkBtn {
      width: 56px;
      height: 44px;
      border-radius: 10px;
      cursor: pointer;
      border: 2px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease, transform 0.08s ease, background 0.12s ease;
    }

    .inkBtn.clearBtn {
      background: linear-gradient(180deg, #f05a5d 0%, #d83c3f 100%);
      color: #fff;
      font-weight: 500;
    }

    .inkBtn.clearBtn.active {
      border-color: rgba(255,255,255,0.98);
      box-shadow:
              0 0 0 2px rgba(255,255,255,0.2),
              0 0 14px rgba(255,255,255,0.22),
              inset 0 1px 0 rgba(255,255,255,0.22);
    }

    .inkBtn:hover { opacity: 0.9; }

    .inkBtn.active {
      border-color: rgba(255,255,255,0.95);
      box-shadow:
              0 0 0 2px rgba(255,255,255,0.18),
              0 0 14px rgba(255,255,255,0.28),
              inset 0 0 0 1px rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.12);
      transform: translateY(-1px);
    }

    .inkBtn img {
      width: 26px;
      height: 26px;
      pointer-events: none;
    }

  </style>
</head>

<body>
<h2>Mudae '$oc' Assistant</h2>
<p class="subtitle">
  <a href="/">
    Go back to other solvers
  </a>
</p>

<div class="grid" id="grid"></div>
<div class="palette" id="palette"></div>



<script>
  class MudaeSocAssistant {
    constructor() {
      this.ICONS = {
        Purple:  "https://cdn.discordapp.com/emojis/1437140625844867244.webp",
        Blue:    "https://cdn.discordapp.com/emojis/1437140639987929108.webp",
        Teal:    "https://cdn.discordapp.com/emojis/1437140651614535680.webp",
        Yellow:  "https://cdn.discordapp.com/emojis/1437140677187338310.webp",
        Orange:  "https://cdn.discordapp.com/emojis/1437140688608432185.webp",
        Green:   "https://cdn.discordapp.com/emojis/1437140664193126441.webp",
        Red:     "https://cdn.discordapp.com/emojis/1437140700604137554.webp",
        White:   "https://cdn.discordapp.com/emojis/1437140737459486780.webp",
        Black:   "https://cdn.discordapp.com/emojis/1437140725492879471.webp",
        Mystery: "https://cdn.discordapp.com/emojis/1437140748423270441.webp",
      };

      this.INKS = [
        { key: "None",   icon: this.ICONS.Mystery },
        { key: "Teal",   icon: this.ICONS.Teal },
        { key: "Blue",   icon: this.ICONS.Blue },
        { key: "Yellow", icon: this.ICONS.Yellow },
        { key: "Green",  icon: this.ICONS.Green },
        { key: "Orange", icon: this.ICONS.Orange },
        { key: "Red",    icon: this.ICONS.Red },
        { key: "Clear",  icon: this.ICONS.Mystery }
      ];

      this.N = 5;
      this.CENTER = { r: 2, c: 2 };
      this.ORANGE_COUNT = 2;
      this.YELLOW_COUNT = 3;

      this.gridEl = document.getElementById("grid");
      this.paletteEl = document.getElementById("palette");

      this.currentInk = "None";
      this.board = this.makeEmptyBoard();

      this.createPalette();
      this.render();
    }

    makeEmptyBoard() {
      return Array.from({ length: this.N }, () => Array(this.N).fill(null));
    }

    isCenter(r, c) {
      return r === this.CENTER.r && c === this.CENTER.c;
    }

    inBounds(r, c) {
      return r >= 0 && r < this.N && c >= 0 && c < this.N;
    }

    getMark(r, c) {
      return this.board[r][c];
    }

    setMark(r, c, value) {
      if (!this.canPlaceMarkAt(r, c, value)) {
        return false;
      }
      this.board[r][c] = value;
      return true;
    }

    canPlaceMarkAt(r, c, value) {
      if (value === null) {
        return true;
      }

      if (this.isCenter(r, c) && value === "Red") {
        return false;
      }

      const current = this.board[r][c];
      if (current === value) {
        return true;
      }

      if (value === "Red") {
        const placedRed = this.getPlacedRedCell();
        if (placedRed && !(placedRed[0] === r && placedRed[1] === c)) {
          return false;
        }
      }

      const oldValue = this.board[r][c];
      this.board[r][c] = value;

      const valid =
              this.getPlacedCount("Red") <= 1 &&
              this.getPlacedCount("Orange") <= this.ORANGE_COUNT &&
              this.getPlacedCount("Yellow") <= this.YELLOW_COUNT &&
              this.boardHasAnyConsistentSolution();

      this.board[r][c] = oldValue;
      return valid;
    }

    boardHasAnyConsistentSolution() {
      const candidateReds = this.getCandidateRedCells();
      if (candidateReds.length === 0) {
        return false;
      }

      for (const [rr, rc] of candidateReds) {
        const orangeDist = this.getOrangeDistributionForRed(rr, rc);
        const yellowDist = this.getYellowDistributionForRed(rr, rc);

        if (orangeDist && yellowDist) {
          return true;
        }
      }

      return false;
    }

    getAllowedMarksForCell(r, c) {
      return this.INKS
              .map(ink => ink.key)
              .filter(key => {
                const value = key === "None" ? null : key;
                return this.canPlaceMarkAt(r, c, value);
              });
    }

    getPlacedCount(color) {
      return this.board.flat().filter(v => v === color).length;
    }

    getPlacedRedCell() {
      for (let r = 0; r < this.N; r++) {
        for (let c = 0; c < this.N; c++) {
          if (this.board[r][c] === "Red") return [r, c];
        }
      }
      return null;
    }

    hasAnyRed() {
      return this.getPlacedRedCell() !== null;
    }

    canInteractCell(r, c) {
      return true;
    }

    isOrthAdjacent(r1, c1, r2, c2) {
      const dr = Math.abs(r1 - r2);
      const dc = Math.abs(c1 - c2);
      return (dr === 1 && dc === 0) || (dr === 0 && dc === 1);
    }

    isDiagonal(r1, c1, r2, c2) {
      const dr = Math.abs(r1 - r2);
      const dc = Math.abs(c1 - c2);
      return dr === dc && dr > 0;
    }

    isLine(r1, c1, r2, c2) {
      return r1 === r2 || c1 === c2;
    }

    getOrthCells(rr, rc) {
      const out = [];
      const dirs = [
        [-1, 0],
        [1, 0],
        [0, -1],
        [0, 1],
      ];

      for (const [dr, dc] of dirs) {
        const r = rr + dr;
        const c = rc + dc;
        if (this.inBounds(r, c) && !this.isCenter(r, c)) {
          out.push([r, c]);
        }
      }
      return out;
    }

    getDiagonalCells(rr, rc) {
      const out = [];
      for (let r = 0; r < this.N; r++) {
        for (let c = 0; c < this.N; c++) {
          if (r === rr && c === rc) continue;
          if (this.isCenter(r, c)) continue;
          if (this.isDiagonal(r, c, rr, rc)) out.push([r, c]);
        }
      }
      return out;
    }

    combinations(arr, k) {
      const result = [];
      const cur = [];

      const dfs = (start) => {
        if (cur.length === k) {
          result.push(cur.slice());
          return;
        }
        for (let i = start; i < arr.length; i++) {
          cur.push(arr[i]);
          dfs(i + 1);
          cur.pop();
        }
      };

      if (k === 0) return [[]];
      if (k < 0 || k > arr.length) return [];
      dfs(0);
      return result;
    }

    isValidRed(rr, rc) {
      if (this.isCenter(rr, rc)) return false;

      for (let r = 0; r < this.N; r++) {
        for (let c = 0; c < this.N; c++) {
          const mark = this.board[r][c];
          if (!mark) continue;

          const isLine = this.isLine(r, c, rr, rc);
          const isDiag = this.isDiagonal(r, c, rr, rc);
          const isOrthAdjacent = this.isOrthAdjacent(r, c, rr, rc);

          if (mark === "Teal"   && !(isLine || isDiag)) return false;
          if (mark === "Blue"   && (isLine || isDiag))  return false;
          if (mark === "Yellow" && !isDiag)             return false;
          if (mark === "Green"  && !isLine)             return false;
          if (mark === "Orange" && !isOrthAdjacent)     return false;
          if (mark === "Red"    && !(r === rr && c === rc)) return false;
        }
      }

      return true;
    }

    getCandidateRedCells() {
      const placedRed = this.getPlacedRedCell();

      if (placedRed) {
        const [rr, rc] = placedRed;
        if (this.isValidRed(rr, rc)) return [[rr, rc]];
        return [];
      }

      const out = [];
      for (let r = 0; r < this.N; r++) {
        for (let c = 0; c < this.N; c++) {
          if (this.isCenter(r, c)) continue;
          if (this.board[r][c] !== null) continue;
          if (this.isValidRed(r, c)) out.push([r, c]);
        }
      }
      return out;
    }

    getOrangeDistributionForRed(rr, rc) {
      const orth = this.getOrthCells(rr, rc);
      const forced = [];
      const open = [];

      for (const [r, c] of orth) {
        const mark = this.getMark(r, c);
        if (mark === "Orange") forced.push([r, c]);
        else if (mark === null) open.push([r, c]);
      }

      for (let r = 0; r < this.N; r++) {
        for (let c = 0; c < this.N; c++) {
          if (this.getMark(r, c) !== "Orange") continue;
          if (!this.isOrthAdjacent(r, c, rr, rc)) return null;
        }
      }

      if (forced.length > this.ORANGE_COUNT) return null;

      const need = this.ORANGE_COUNT - forced.length;
      const combos = this.combinations(open, need);
      if (combos.length === 0) return null;

      const weights = Array.from({ length: this.N }, () => Array(this.N).fill(0));

      for (const extra of combos) {
        const set = [...forced, ...extra];
        for (const [r, c] of set) {
          weights[r][c] += 1;
        }
      }

      return {
        comboCount: combos.length,
        weights,
      };
    }

    getYellowDistributionForRed(rr, rc) {
      const diag = this.getDiagonalCells(rr, rc);
      const forced = [];
      const open = [];

      for (const [r, c] of diag) {
        const mark = this.getMark(r, c);
        if (mark === "Yellow") forced.push([r, c]);
        else if (mark === null) open.push([r, c]);
      }

      for (let r = 0; r < this.N; r++) {
        for (let c = 0; c < this.N; c++) {
          if (this.getMark(r, c) !== "Yellow") continue;
          if (!this.isDiagonal(r, c, rr, rc)) return null;
        }
      }

      if (forced.length > this.YELLOW_COUNT) return null;

      const need = this.YELLOW_COUNT - forced.length;
      const combos = this.combinations(open, need);
      if (combos.length === 0) return null;

      const weights = Array.from({ length: this.N }, () => Array(this.N).fill(0));

      for (const extra of combos) {
        const set = [...forced, ...extra];
        for (const [r, c] of set) {
          weights[r][c] += 1;
        }
      }

      return {
        comboCount: combos.length,
        weights,
      };
    }

    analyzeBoard() {
      const candidateReds = this.getCandidateRedCells();

      const redPct = Array.from({ length: this.N }, () => Array(this.N).fill(0));
      const orangePct = Array.from({ length: this.N }, () => Array(this.N).fill(0));
      const yellowPct = Array.from({ length: this.N }, () => Array(this.N).fill(0));

      if (candidateReds.length === 0) {
        return {
          candidateReds,
          redPct,
          orangePct,
          yellowPct,
        };
      }

      const redWeight = 1 / candidateReds.length;

      for (const [rr, rc] of candidateReds) {
        redPct[rr][rc] += redWeight;

        const orangeDist = this.getOrangeDistributionForRed(rr, rc);
        if (orangeDist) {
          for (let r = 0; r < this.N; r++) {
            for (let c = 0; c < this.N; c++) {
              if (orangeDist.weights[r][c] > 0) {
                orangePct[r][c] += redWeight * (orangeDist.weights[r][c] / orangeDist.comboCount);
              }
            }
          }
        }

        const yellowDist = this.getYellowDistributionForRed(rr, rc);
        if (yellowDist) {
          for (let r = 0; r < this.N; r++) {
            for (let c = 0; c < this.N; c++) {
              if (yellowDist.weights[r][c] > 0) {
                yellowPct[r][c] += redWeight * (yellowDist.weights[r][c] / yellowDist.comboCount);
              }
            }
          }
        }
      }

      return {
        candidateReds,
        redPct,
        orangePct,
        yellowPct,
      };
    }

    getActiveTier() {
      const redCount = this.getPlacedCount("Red");
      const orangeCount = this.getPlacedCount("Orange");

      if (redCount === 0) return "Red";
      if (orangeCount < this.ORANGE_COUNT) return "Orange";
      return "Yellow";
    }

    getMaxGridValue(grid) {
      let max = 0;
      for (let r = 0; r < this.N; r++) {
        for (let c = 0; c < this.N; c++) {
          if (grid[r][c] > max) max = grid[r][c];
        }
      }
      return max;
    }

    toPercentString(prob) {
      return `${Math.round(prob * 100)}%`;
    }

    mixColor(from, to, t) {
      const clamped = Math.max(0, Math.min(1, t));
      const r = Math.round(from[0] + (to[0] - from[0]) * clamped);
      const g = Math.round(from[1] + (to[1] - from[1]) * clamped);
      const b = Math.round(from[2] + (to[2] - from[2]) * clamped);
      return `rgb(${r}, ${g}, ${b})`;
    }

    getRowTextColor(kind, value, maxValue) {
      if (value <= 0 || maxValue <= 0) {
        return "rgb(219, 222, 225)";
      }

      const normalized = value / maxValue;

      // Stronger contrast curve.
      // Small values stay pale, high values pop much harder.
      const curved = Math.pow(normalized, 4);

      const paleMap = {
        Red: [235, 220, 220],
        Orange: [236, 226, 214],
        Yellow: [236, 235, 210],
      };

      const vividMap = {
        Red: [255, 70, 70],
        Orange: [255, 170, 55],
        Yellow: [255, 235, 40],
      };

      return this.mixColor(paleMap[kind], vividMap[kind], curved);
    }

    makeStatRow(iconSrc, valueText, textColor, isActive) {
      const row = document.createElement("div");
      row.className = "statRow" + (isActive ? " active" : "");

      const icon = document.createElement("img");
      icon.src = iconSrc;
      icon.className = "statIcon";

      const text = document.createElement("span");
      text.className = "statValue";
      text.textContent = valueText;
      text.style.color = textColor;

      row.appendChild(icon);
      row.appendChild(text);
      return row;
    }

    buildStatsElement(r, c, analysis, maxima) {
      const box = document.createElement("div");
      box.className = "stats";

      const state = this.getMark(r, c);
      const tier = this.getActiveTier();

      let redProb = analysis.redPct[r][c];
      let orangeProb = analysis.orangePct[r][c];
      let yellowProb = analysis.yellowPct[r][c];

      if (this.isCenter(r, c)) {
        redProb = 0;
        orangeProb = 0;
        yellowProb = 0;
      } else if (state === "Red") {
        redProb = 1;
        orangeProb = 0;
        yellowProb = 0;
      } else if (state === "Orange") {
        redProb = 0;
        orangeProb = 1;
        yellowProb = 0;
      } else if (state === "Yellow") {
        redProb = 0;
        orangeProb = 0;
        yellowProb = 1;
      } else if (state) {
        redProb = 0;
        orangeProb = 0;
        yellowProb = 0;
      }

      const rows = [
        {
          kind: "Red",
          prob: redProb,
          icon: this.ICONS.Red,
          active: tier === "Red",
          max: Math.max(maxima.redMax, state === "Red" ? 1 : 0),
        },
        {
          kind: "Orange",
          prob: orangeProb,
          icon: this.ICONS.Orange,
          active: tier === "Orange",
          max: Math.max(maxima.orangeMax, state === "Orange" ? 1 : 0),
        },
        {
          kind: "Yellow",
          prob: yellowProb,
          icon: this.ICONS.Yellow,
          active: tier === "Yellow",
          max: Math.max(maxima.yellowMax, state === "Yellow" ? 1 : 0),
        },
      ];

      const visibleRows = rows.filter(row => row.prob > 0);

      if (visibleRows.length === 0) {
        return box;
      }

      for (const row of visibleRows) {
        box.appendChild(
                this.makeStatRow(
                        row.icon,
                        this.toPercentString(row.prob),
                        this.getRowTextColor(row.kind, row.prob, row.max),
                        row.active
                )
        );
      }

      return box;
    }

    getCellDisplayMode(r, c, analysis) {
      const state = this.getMark(r, c);

      if (this.isCenter(r, c)) return "center";
      if (state) return "marked";

      const hasAnyChance =
              analysis.redPct[r][c] > 0 ||
              analysis.orangePct[r][c] > 0 ||
              analysis.yellowPct[r][c] > 0;

      return hasAnyChance ? "live" : "empty";
    }

    render() {
      const analysis = this.analyzeBoard();

      const maxima = {
        redMax: this.getMaxGridValue(analysis.redPct),
        orangeMax: this.getMaxGridValue(analysis.orangePct),
        yellowMax: this.getMaxGridValue(analysis.yellowPct),
      };

      this.gridEl.innerHTML = "";

      for (let r = 0; r < this.N; r++) {
        for (let c = 0; c < this.N; c++) {
          const cell = document.createElement("div");
          cell.className = "cellBox";

          cell.onclick = () => {
            if (!this.canInteractCell(r, c)) return;

            const nextValue = this.currentInk === "None" ? null : this.currentInk;
            const changed = this.setMark(r, c, nextValue);

            if (changed) {
              this.render();
            }
          };

          const displayMode = this.getCellDisplayMode(r, c, analysis);
          if (displayMode === "center") cell.classList.add("centerCell");
          if (displayMode === "marked") cell.classList.add("markedCell");
          if (displayMode === "live") cell.classList.add("liveCell");
          if (displayMode === "empty") cell.classList.add("emptyCell");

          const state = this.getMark(r, c);
          if (state) {
            const img = document.createElement("img");
            img.src = this.ICONS[state];
            img.className = "icon";
            cell.appendChild(img);
          }

          cell.appendChild(this.buildStatsElement(r, c, analysis, maxima));
          this.gridEl.appendChild(cell);
        }
      }
    }

    createPalette() {
      this.paletteEl.innerHTML = "";

      this.INKS.forEach((ink, i) => {
        const btn = document.createElement("div");
        btn.className = "inkBtn" + (i === 0 ? " active" : "");

        if (ink.key === "Clear") {
          btn.classList.add("clearBtn");
        }

        btn.onclick = () => {
          if (ink.key === "Clear") {
            this.board = this.makeEmptyBoard();
            this.currentInk = "None";
            this.createPalette();
            this.render();
            return;
          }

          this.currentInk = ink.key;
          document.querySelectorAll(".inkBtn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
        };

        if (ink.key === "Clear") {
          btn.textContent = "Clear";
        } else {
          const img = document.createElement("img");
          img.src = ink.icon;
          btn.appendChild(img);
        }

        this.paletteEl.appendChild(btn);
      });
    }
  }

  new MudaeSocAssistant();
</script>
</body>
</html>
