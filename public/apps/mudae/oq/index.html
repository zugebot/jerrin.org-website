<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Mudae $oq Assistant</title>

    <style>
        :root {
            --bg: #313338;
            --panel: #2b2d31;
            --cell: #4e5058;
            --text: #dbdee1;
            --danger: #ed4245;

            --possible: #5865f2;
            --blocked: #232428;
            --blockedText: #8a8f98;
        }

        body {
            font-family: "gg sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            margin: 6px 0 2px 0;
            line-height: 1.1;
        }

        .subtitle {
            margin: 0 0 14px 0;
            font-size: 0.72rem;
            opacity: 0.75;
            text-align: center;
            max-width: 620px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 60px);
            gap: 8px;
            background: var(--panel);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 18px;
        }

        .cellBox {
            width: 60px;
            height: 45px;
            background: var(--cell);
            border-radius: 6px;
            border: 1px solid rgba(0,0,0,0.12);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .cellBox:hover { opacity: 0.86; }

        .cellBox.possible {
            background: var(--possible);
            color: #fff;
        }

        .cellBox.blocked {
            background: var(--blocked);
            color: var(--blockedText);
        }

        .cellBox.locked {
            cursor: not-allowed;
        }

        .icon {
            width: 22px;
            height: 22px;
            pointer-events: none;
        }

        .prob {
            margin-top: 2px;
            font-size: 0.78rem;
            font-weight: 900;
            pointer-events: none;
            line-height: 1;
        }

        .palette {
            display: grid;
            grid-template-columns: repeat(4, 56px);
            gap: 10px;
            background: var(--panel);
            padding: 14px;
            border-radius: 8px;
            justify-content: center;
            align-items: center;
        }

        .inkBtn {
            width: 56px;
            height: 44px;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            background: rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .inkBtn.clearBtn {
            background: var(--danger);
            color: #fff;
            border: none;
        }

        .inkBtn:hover { opacity: 0.9; }

        .inkBtn.active {
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255,255,255,0.25);
        }

        .inkBtn img {
            width: 26px;
            height: 26px;
            pointer-events: none;
        }
    </style>
</head>

<body>
<h2>Mudae '$oq' Assistant</h2>
<p class="subtitle">
    <a href="/" style="color: #dbdee1; text-decoration: underline;">Go back to other solvers</a>
    | You get <b>7 non-purple clicks</b>. Purples are free.<br>
    Blue=0, Teal=1, Green=2, Yellow=3, Orange=4 neighboring purples.
</p>

<div class="grid" id="grid"></div>
<div class="palette" id="palette"></div>
<script>
    const N = 5;
    const TOTAL_PURPLES = 4;
    const MAX_CLICKS = 7;

    const CLUE_VALUE = { Blue:0, Teal:1, Green:2, Yellow:3, Orange:4 };

    const ICONS = {
        Purple:  "https://cdn.discordapp.com/emojis/1437140625844867244.webp",
        Blue:    "https://cdn.discordapp.com/emojis/1437140639987929108.webp",
        Teal:    "https://cdn.discordapp.com/emojis/1437140651614535680.webp",
        Green:   "https://cdn.discordapp.com/emojis/1437140664193126441.webp",
        Yellow:  "https://cdn.discordapp.com/emojis/1437140677187338310.webp",
        Orange:  "https://cdn.discordapp.com/emojis/1437140688608432185.webp",
        Red:     "https://cdn.discordapp.com/emojis/1437140700604137554.webp",
        Mystery: "https://cdn.discordapp.com/emojis/1437140748423270441.webp",
    };

    const INKS = [
        { key: "None",   icon: ICONS.Mystery },
        { key: "Purple", icon: ICONS.Purple },
        { key: "Blue",   icon: ICONS.Blue },
        { key: "Teal",   icon: ICONS.Teal },
        { key: "Green",  icon: ICONS.Green },
        { key: "Yellow", icon: ICONS.Yellow },
        { key: "Orange", icon: ICONS.Orange },
        { key: "Clear" },
    ];

    const gridEl = document.getElementById("grid");
    const paletteEl = document.getElementById("palette");

    let currentInk = "None";
    let board = Array.from({ length: N }, () => Array(N).fill(null));

    function countNonPurpleClicks() {
        return board.flat().filter(x => x && x !== "Purple").length;
    }

    function countPurples() {
        return board.flat().filter(x => x === "Purple").length;
    }

    function onCellClick(r, c) {
        const prev = board[r][c];
        const next = (currentInk === "None") ? null : currentInk;

        if (prev === null && next && next !== "Purple" &&
            countNonPurpleClicks() >= MAX_CLICKS) return;

        board[r][c] = next;
        update();
    }

    function enumerate() {
        const must = [];
        const forbid = [];
        const clues = [];

        for (let r=0;r<N;r++) for (let c=0;c<N;c++) {
            const s = board[r][c];
            const id = r*N + c;
            if (s === "Purple") must.push(id);
            else if (s) { forbid.push(id); clues.push({ id, req: CLUE_VALUE[s] }); }
        }

        let total = 0;
        const counts = Array(N*N).fill(0);

        for (let a=0;a<25;a++) for (let b=a+1;b<25;b++)
            for (let c=b+1;c<25;c++) for (let d=c+1;d<25;d++) {
                const set = [a,b,c,d];
                if (!must.every(x => set.includes(x))) continue;
                if (forbid.some(x => set.includes(x))) continue;

                let ok = true;
                for (const cl of clues) {
                    let cnt = 0;
                    const rr = Math.floor(cl.id/5);
                    const cc = cl.id % 5;
                    for (const x of set) {
                        const r = Math.floor(x/5);
                        const c = x % 5;
                        if (Math.abs(r-rr)<=1 && Math.abs(c-cc)<=1 && !(r===rr && c===cc)) cnt++;
                    }
                    if (cnt !== cl.req) { ok=false; break; }
                }
                if (!ok) continue;

                total++;
                set.forEach(x => counts[x]++);
            }

        return { total, counts };
    }

    function update() {
        const { total, counts } = enumerate();
        const purples = countPurples();

        gridEl.innerHTML = "";
        let i = 0;

        for (let r=0;r<N;r++) for (let c=0;c<N;c++,i++) {
            const cell = document.createElement("div");
            cell.className = "cellBox";
            cell.onclick = () => onCellClick(r,c);

            const s = board[r][c];
            if (s) {
                cell.appendChild(icon(ICONS[s]));
                gridEl.appendChild(cell);
                continue;
            }

            const p = total ? Math.round((counts[i] / total) * 100) : 0;
            cell.classList.add(p ? "possible" : "blocked");
            cell.appendChild(icon(purples >= 3 ? ICONS.Red : ICONS.Purple));
            cell.appendChild(prob(`${p}%`));

            if (countNonPurpleClicks() >= MAX_CLICKS) cell.classList.add("locked");

            gridEl.appendChild(cell);
        }
    }

    function icon(src) {
        const i = document.createElement("img");
        i.className = "icon";
        i.src = src;
        return i;
    }

    function prob(t) {
        const d = document.createElement("div");
        d.className = "prob";
        d.textContent = t;
        return d;
    }

    function createPalette() {
        paletteEl.innerHTML = "";
        INKS.forEach((ink, i) => {
            const b = document.createElement("div");
            b.className = "inkBtn" + (i === 0 ? " active" : "");

            if (ink.key === "Clear") {
                b.classList.add("clearBtn");
                b.textContent = "Clear";
                b.onclick = () => {
                    board = Array.from({ length: N }, () => Array(N).fill(null));
                    currentInk = "None";
                    createPalette();
                    update();
                };
            } else {
                b.onclick = () => {
                    currentInk = ink.key;
                    document.querySelectorAll(".inkBtn").forEach(x => x.classList.remove("active"));
                    b.classList.add("active");
                };
                b.appendChild(icon(ink.icon));
            }

            paletteEl.appendChild(b);
        });
    }

    createPalette();
    update();
</script>
</body>
</html>
